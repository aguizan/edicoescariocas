<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>EdiĂ§Ăµes Cariocas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Spectral',Georgia,serif;background:#0a0b0d;-webkit-font-smoothing:antialiased;overflow:hidden}
  ::selection{background:#1a1a1a;color:#f4f4f2}
  .svgfill{display:block;width:100%;height:100%}
  .app{position:relative;width:100%;height:100dvh;min-height:640px;overflow:hidden;background:#0a0b0d}
  .home{position:absolute;inset:0}
  .sky{position:absolute;inset:0;background:linear-gradient(180deg,#edf0f2 0%,#f4f4f2 55%,#f6f5f1 100%)}
  .scene{position:absolute;top:0;height:100%;aspect-ratio:390/844;left:50%;transform:translateX(-50%)}
  .layer{position:absolute;inset:0}
  .logo{animation:logoRise 9s cubic-bezier(.18,.55,.14,1) forwards}
  .hot{position:absolute;border:none;background:transparent;border-radius:6px;cursor:pointer;transition:box-shadow .2s,background .2s}
  .hot:hover{background:rgba(26,26,26,.05);box-shadow:inset 0 0 0 2px rgba(26,26,26,.45)}
  .hint{position:absolute;bottom:3.4%;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#1a1a1a;opacity:0;animation:hintIn 9s ease forwards}
  .veil{position:absolute;inset:0;background:#050506;opacity:1;animation:nightLift 9s cubic-bezier(.4,0,.28,1) forwards;pointer-events:none;z-index:9}
  .replay{position:absolute;bottom:16px;right:16px;z-index:15;width:40px;height:40px;border-radius:50%;border:1px solid rgba(26,26,26,.2);background:rgba(244,244,242,.7);backdrop-filter:blur(4px);color:#1a1a1a;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .replay:hover{background:#1a1a1a;color:#f4f4f2}
  @keyframes nightLift{from{opacity:1}to{opacity:0}}
  @keyframes logoRise{0%{opacity:0;transform:translateY(46%)}18%{opacity:1}74%,100%{opacity:1;transform:translateY(0)}}
  @keyframes hintIn{0%,82%{opacity:0;transform:translateX(-50%) translateY(6px)}100%{opacity:.8;transform:translateX(-50%) translateY(0)}}
  .panel{position:absolute;inset:0;z-index:20;background:#f4f4f2;color:#1a1a1a;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .55s cubic-bezier(.7,0,.2,1)}
  .panel.open{transform:translateY(0);box-shadow:0 -12px 40px rgba(0,0,0,.28)}
  .phead{position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:14px;padding:14px 20px;background:#f4f4f2;border-bottom:1px solid rgba(26,26,26,.08)}
  .back{width:42px;height:42px;border-radius:50%;border:1px solid rgba(26,26,26,.18);background:transparent;color:#1a1a1a;font-size:20px;line-height:1;cursor:pointer;flex:0 0 auto}
  .back:hover{background:#1a1a1a;color:#f4f4f2}
  .brand{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(26,26,26,.5)}
  .pbody{flex:1;padding:34px 26px 60px}
  .kicker{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:rgba(26,26,26,.5);margin-bottom:14px}
  h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:52px;line-height:1;margin-bottom:26px}
  .lead{font-size:19px;line-height:1.75;color:#2b2b2b;max-width:32ch}
  .rule{width:44px;height:1px;background:#1a1a1a;margin:34px 0}
  .quote{font-style:italic;font-weight:300;font-size:18px;line-height:1.8;color:rgba(26,26,26,.7);max-width:34ch}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:30px}
  .ph{border:1px solid rgba(26,26,26,.2);background:repeating-linear-gradient(45deg,#e9e9e4,#e9e9e4 7px,#efefe9 7px,#efefe9 14px);display:flex;align-items:flex-end;padding:12px;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:rgba(26,26,26,.55)}
  .cover{aspect-ratio:2/3}
  .wide{aspect-ratio:16/10;margin-bottom:26px}
  .btn{display:inline-flex;align-items:center;gap:10px;padding:13px 22px;border:1px solid #1a1a1a;color:#1a1a1a;text-decoration:none;font-size:13px;letter-spacing:2px;text-transform:uppercase;transition:background .2s,color .2s;background:none;cursor:pointer;font-family:inherit}
  .btn:hover{background:#1a1a1a;color:#f4f4f2}
  .btn.block{display:flex;justify-content:center;padding:15px}
  .sep{display:flex;align-items:center;gap:14px;margin:26px 0;color:rgba(26,26,26,.4);font-size:12px;letter-spacing:2px;text-transform:uppercase}
  .sep span{flex:1;height:1px;background:rgba(26,26,26,.15)}
  form{display:flex;flex-direction:column;gap:22px}
  form input,form textarea{border:none;border-bottom:1px solid rgba(26,26,26,.28);background:transparent;padding:10px 2px;font-size:17px;color:#1a1a1a;outline:none;font-family:inherit}
  form textarea{resize:none}
  form input:focus,form textarea:focus{border-bottom-color:#1a1a1a}
  .send{align-self:flex-start;padding:14px 30px;border:none;background:#1a1a1a;color:#f4f4f2;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:inherit}
  .thanks{display:none;font-family:'Instrument Serif',serif;font-size:26px}
  .carousel{display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding:10px 26px 18px;margin:14px -26px 0}
  .carousel::-webkit-scrollbar{height:6px}
  .carousel::-webkit-scrollbar-thumb{background:rgba(26,26,26,.2);border-radius:3px}
  .bookcard{flex:0 0 auto;width:150px;scroll-snap-align:start;cursor:pointer;background:none;border:none;padding:0;text-align:left;font-family:inherit}
  .bookcard .cover{width:150px;height:225px;aspect-ratio:auto;transition:transform .2s,box-shadow .2s}
  .bookcard:hover .cover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.16)}
  .bookmeta{margin-top:8px;font-size:13px;line-height:1.35;color:#1a1a1a}
  .bookmeta span{color:rgba(26,26,26,.55)}
  #book,#svc{z-index:30}
  @media (prefers-reduced-motion: reduce){.veil{animation:none;opacity:0}.logo{animation:none;transform:none}.hint{animation:none;opacity:.8}}
</style>
<script src="conteudo.js"></script>
</head>

        '<h1 style="font-size:40px">'+esc(it.titulo)+'</h1>'+desc);
    }
    document.getElementById('svc').classList.add('open');
    var pb=document.getElementById('pb-svc'); if(pb) pb.scrollTop=0;
  }
  var sbb=document.querySelector('.back-svc');
  if(sbb) sbb.addEventListener('click',function(){ document.getElementById('svc').classList.remove('open'); });

  if(C.contato){
    var ct=C.contato;
    var k=document.getElementById('ct-kicker'); if(k) k.textContent=ct.kicker;
    var t=document.getElementById('ct-titulo'); if(t) t.textContent=ct.titulo;
    var wa=document.getElementById('ct-wa');
    if(wa && ct.whatsapp) wa.href='https://wa.me/'+ct.whatsapp+'?text='+encodeURIComponent('OlĂ¡, vim atravĂ©s do site da EdiĂ§Ăµes Cariocas');
    var em=document.getElementById('ct-email');
    if(em && ct.email){
      em.textContent=ct.email;
      em.addEventListener('click',function(){
        var ok=false;
        try{
          var ta=document.createElement('textarea'); ta.value=ct.email;
          ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
          ta.select(); ok=document.execCommand('copy'); document.body.removeChild(ta);
        }catch(e){ ok=false; }
        if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(ct.email).catch(function(){}); }
        var m=document.getElementById('ct-email-msg');
        if(m){ m.textContent = ok ? 'copiado âœ“' : ct.email; m.style.opacity='1'; setTimeout(function(){m.style.opacity='0';},2000); }
      });
    }
  }
})();
</script>
<script>
(function(){
  function openPanel(id){ var p=document.getElementById(id); if(p) p.classList.add('open'); }
  function closeAll(){ var ps=document.querySelectorAll('.panel.open'); for(var i=0;i<ps.length;i++) ps[i].classList.remove('open'); }
  var hots=document.querySelectorAll('.hot');
  for(var i=0;i<hots.length;i++){ hots[i].addEventListener('click',function(){ openPanel(this.getAttribute('data-target')); }); }
  var backs=document.querySelectorAll('.back');
  for(var j=0;j<backs.length;j++){ backs[j].addEventListener('click',closeAll); }
  var replay=document.querySelector('.replay');
  replay.addEventListener('click',function(){
    closeAll();
    var els=[document.querySelector('.veil'),document.querySelector('.logo')];
    for(var k=0;k<els.length;k++){ var el=els[k]; el.style.animation='none'; void el.offsetWidth; el.style.animation=''; }
  });
})();
</script>
